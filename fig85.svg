<svg width="340" height="165" viewBox="0 0 340 165" xmlns="http://www.w3.org/2000/svg" font-family="Arial" font-size="13">
  <!-- C1=C2-C3-C4 -->
  <text x="35"  y="90" text-anchor="middle" font-size="15" font-weight="bold">C</text>
  <text x="120" y="90" text-anchor="middle" font-size="15" font-weight="bold">C</text>
  <text x="210" y="90" text-anchor="middle" font-size="15" font-weight="bold">C</text>
  <text x="295" y="90" text-anchor="middle" font-size="15" font-weight="bold">C</text>
  <!-- doble enlace C1=C2 -->
  <line x1="46"  y1="83" x2="110" y2="83" stroke="#333" stroke-width="2"/>
  <line x1="46"  y1="91" x2="110" y2="91" stroke="#333" stroke-width="2"/>
  <!-- enlaces simples -->
  <line x1="130" y1="85" x2="200" y2="85" stroke="#333" stroke-width="2"/>
  <line x1="220" y1="85" x2="285" y2="85" stroke="#333" stroke-width="2"/>
  <!-- H en C1 -->
  <line x1="22"  y1="78" x2="5"   y2="60" stroke="#333" stroke-width="1.5"/><text x="2"  y="56" text-anchor="middle">H</text>
  <line x1="22"  y1="95" x2="5"   y2="113" stroke="#333" stroke-width="1.5"/><text x="2" y="122" text-anchor="middle">H</text>
  <!-- ramificación CH3 en C2 hacia arriba -->
  <line x1="120" y1="78" x2="120" y2="44" stroke="#333" stroke-width="2"/>
  <text x="120" y="36" text-anchor="middle" font-size="15" font-weight="bold">C</text>
  <line x1="108" y1="32" x2="90"  y2="18" stroke="#333" stroke-width="1.5"/><text x="86"  y="14" font-size="12" text-anchor="middle">H</text>
  <line x1="132" y1="32" x2="150" y2="18" stroke="#333" stroke-width="1.5"/><text x="154" y="14" font-size="12" text-anchor="middle">H</text>
  <line x1="120" y1="26" x2="120" y2="12" stroke="#333" stroke-width="1.5"/><text x="120" y="8" font-size="12" text-anchor="middle">H</text>
  <!-- H C3 -->
  <line x1="210" y1="78" x2="210" y2="52" stroke="#333" stroke-width="1.5"/><text x="210" y="45" text-anchor="middle">H</text>
  <line x1="210" y1="96" x2="210" y2="120" stroke="#333" stroke-width="1.5"/><text x="210" y="132" text-anchor="middle">H</text>
  <!-- H C4 -->
  <line x1="295" y1="78" x2="295" y2="52" stroke="#333" stroke-width="1.5"/><text x="295" y="45" text-anchor="middle">H</text>
  <line x1="307" y1="85" x2="330" y2="85" stroke="#333" stroke-width="1.5"/><text x="334" y="89" text-anchor="start">H</text>
  <line x1="295" y1="96" x2="295" y2="120" stroke="#333" stroke-width="1.5"/><text x="295" y="132" text-anchor="middle">H</text>
  <text x="165" y="152" text-anchor="middle" font-size="11" fill="#555">2-metilbut-1-eno (C₅H₁₀)</text>
</svg>
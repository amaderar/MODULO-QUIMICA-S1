<svg width="260" height="160" viewBox="0 0 260 160" xmlns="http://www.w3.org/2000/svg" font-family="Arial" font-size="13">
  <!-- Na+ -->
  <circle cx="70" cy="80" r="35" fill="#e8f4f8" stroke="#1a5276" stroke-width="2"/>
  <text x="70" y="75" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a5276">Na</text>
  <text x="70" y="93" text-anchor="middle" font-size="12" fill="#1a5276">+</text>
  <!-- flecha transferencia -->
  <line x1="108" y1="80" x2="148" y2="80" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <defs><marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#333"/></marker></defs>
  <text x="128" y="72" text-anchor="middle" font-size="10" fill="#555">e⁻</text>
  <!-- Cl- -->
  <circle cx="190" cy="80" r="42" fill="#fef9f0" stroke="#c0392b" stroke-width="2"/>
  <text x="190" y="75" text-anchor="middle" font-size="16" font-weight="bold" fill="#c0392b">Cl</text>
  <text x="190" y="93" text-anchor="middle" font-size="12" fill="#c0392b">−</text>
  <text x="130" y="148" text-anchor="middle" font-size="12" font-weight="bold">NaCl – Enlace Iónico</text>
  <text x="130" y="162" text-anchor="middle" font-size="10" fill="#555">Transferencia de electrones</text>
</svg>